[project]
name = "incident-prioritization-backend"
version = "0.1.0"
description = "Sistema Inteligente de Priorización de Incidentes IT"
readme = "README.md"
requires-python = ">=3.14,<4.0"
authors = [
    {name = "Jesus-MMM", email = "jesusmanuelmercadomachado@gmail.com"}
]
license = {text = "MIT"}

dependencies = [
    # Core Framework
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",

    # Database
    "sqlalchemy>=2.0.36",
    "alembic>=1.14.0",
    "aiosqlite>=0.20.0",
    "psycopg2-binary>=2.9.10",
    "asyncpg>=0.30.0",

    # AI/ML
    "scikit-learn>=1.6.0",
    "numpy>=2.2.0",
    "pandas>=3.0.2",
    "joblib>=1.4.0",

    # Embeddings
    "sentence-transformers>=5.3.0",
    "pgvector>=0.3.0",

    # Cache & Queue
    "redis>=7.4.0",

    # Security
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "python-multipart>=0.0.20",

    # Utilities
    "loguru>=0.7.0",
    "structlog>=25.0.0",
    "python-dateutil>=2.9.0",
    "httpx>=0.28.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "pytest-xdist>=3.6.0",
    "ruff>=0.9.0",
    "mypy>=1.15.0",
    "black>=26.3.1",
]

[project.scripts]
app = "src.main:main"

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
package-mode = false

[tool.ruff]
line-length = 88
target-version = "py314"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "ANN"]
ignore = ["ANN101", "ANN102", "ANN401"]

[tool.ruff.lint]
fixable = ["ALL"]

[tool.mypy]
python_version = "3.14"
strict = false
ignore_missing_imports = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "**/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
